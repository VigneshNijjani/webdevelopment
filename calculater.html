<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #display{
            border: 3px solid;
            height: 100px;
            width: 398px;
            font-size: 25px;
            font-weight: 700;
            display: flex;
            justify-content: end;
            align-items: end;
        }
        #main{
            border: 1px solid;
            height: 500px;
            width: 400px;
            display: grid;
            grid-template-columns: 25% 25% 25% 25%;
            div{
                border: 1px solid;
                text-align: center;
                align-content: center;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    
        <div id="display"></div>
    <div id="main">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>+</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>-</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>*</div>
        <div>clear</div>
        <div>back</div>
        <div >0</div>
        <div >/</div>
        <div >=</div>
    </div>
   
    



    <script src="calculator.js"></script>
</body>
</html>
