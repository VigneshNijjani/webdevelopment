<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truth or Dare</title>

<style>

body{
    background-color:white;
    font-family: Arial;
}

#container{
    width:90%;
    height:80vh;
    margin:auto;
    display:grid;
    grid-template-columns:30% 30% 30%;
    grid-template-rows:33% 33% 33%;
    justify-content:center;
    gap:8px;
    border:5px solid black;
    color: white;
    background: darkgray;
}

#box1{
    border-top-left-radius: 50%;
}
#box2{
    border-top-right-radius: 50%;

}
#box3{
    border-bottom-left-radius: 50%;
}
#box4{
    border-bottom-right-radius: 50%;
}

.box{
    border: 1px solid;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:10px;
    
}

.center{
    display:flex;
    justify-content:center;
    align-items:center;
}

img{
    height:300px;
    transition:3s;
}

button{
    margin-top:20px;
    height:40px;
    width:150px;
    font-size:18px;
    border-radius: 5px;
    background-color: black;
    color: white;
    cursor: pointer;
    &:hover{
        transform: scale(1.05);
        border: 1px solid white;
        box-shadow: 0 0 10px black;
    }
}

</style>
</head>
<body>

<center>

<div id="container">

<div id="box1" class="box">Sing your favorite song.</div>
<div class="box">What's your biggest fear?</div>
<div id="box2" class="box">Dance for one minute.</div>

<div class="box">Change your profile picture.</div>

<div class="center">
<img id="bottle" src="./853-8535517_kingfisher-lager-strong-65-cl-india-kingfisher-beer.png">
</div>

<div class="box">Tell a funny joke.</div>

<div id="box3" class="box">Do 10 push-ups.</div>
<div class="box">What's your funniest dream?</div>
<div id="box4" class="box">Call your best friend.</div>

</div>

<button id="btn">Spin</button>


</center>

<script>

let bottle=document.getElementById("bottle");
let btn=document.getElementById("btn");

let total=0;
btn.addEventListener('click',()=>{
        
    let spin=Math.floor(Math.random()*3000)+4500;

    total=total+spin;

    bottle.style.transform=`rotate(${total}deg)`;

})

</script>

</body>
</html>
