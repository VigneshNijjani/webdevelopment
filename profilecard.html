<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            
        }
        .main{
              border: 1px solid;  
              height: 700px;
              background-color:rgb(212, 198, 225);
              display: flex;
              justify-content: center;
            align-items: center;
                    
            }
            .div2{
                border: 1px;
                width: 500px;
                height: 600px;
                border-radius: 20px;
                background-color: aliceblue;
                 display: flex;
                 flex-direction: column;
                justify-content: space-around;
                align-items: center;  
                &:hover{
                    box-shadow: 0px 0px 15px gray;
                }
            }
            .img{
                border: 1px;
                width: 160px;
                height: 160px;
                border-radius: 90px;
                background-image: url("../multimedia/photo\ pass.jpeg");
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;

            }
            .text{
                border: 1px ;
                width: 250px;
                height: 100px;
                text-align: center;
                
                h3{
                    font-size: 25px;
                    font-weight: 100;
                    color: gray;
                }
                p{
                    font-size: 18px;
                    color: gray;
                }
            }
            .but{
                border: 1px ;
                width: 80%;
                height: 60px;
                display: flex;
                 justify-content:space-around;
                 button{
                    font-size: 20px;
                    font-weight: 600;
                    width: 150px;
                    border-radius: 10px;
                    color: white;
                    background-color: rgb(145, 98, 188);
                    border: none;
                    &:hover{
                        transform: scale(1.05);
                        background-color:rgb(216, 200, 229) ;
                        color:rgb(145, 98, 188);
                        border: 1px solid rgb(146, 84, 204);
                    }
                 }
            }

            
    </style>
</head>
<body>
    <div class="main">
        <div class="div2">
                    <div class="img"></div>
                    <div class="text"><h1>N.VIGNESH</h1><BR><H3>Python Developer</H3><br><p>passionate developer who loves working on python projects</p></div>
                    <div class="but"><button>follow</button><button> message</button></div>
        </div>
    </div>
</body>
</html>
